name: Container Build

on:
  workflow_call:
    inputs:
      image:
        description: "Full image name (e.g. ghcr.io/owner/my-service)"
        type: string
        required: true
      containerfile:
        description: "Path to the Containerfile or Dockerfile"
        type: string
        default: "Containerfile"
      context:
        description: "Build context directory"
        type: string
        default: "."
      build-args:
        description: "Newline-separated build-arg pairs (KEY=VALUE)"
        type: string
        default: ""
      skip-if-missing:
        description: "Skip the build if the containerfile does not exist"
        type: boolean
        default: false
      push:
        description: "Push image to registry (only on main branch push events)"
        type: boolean
        default: false
      registry:
        description: "Container registry hostname"
        type: string
        default: "ghcr.io"
    secrets:
      REGISTRY_TOKEN:
        description: "Token for pushing to the registry (GITHUB_TOKEN works for GHCR)"
        required: false
    outputs:
      image_ref:
        description: "Fully-qualified pushed image reference (image:sha), empty if not pushed"
        value: ${{ jobs.build.outputs.image_ref }}


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 30
    name: Container Build
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.set-output.outputs.image_ref }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Check containerfile exists
        id: exists
        env:
          CONTAINERFILE: ${{ inputs.containerfile }}
          SKIP: ${{ inputs.skip-if-missing }}
        run: |
          set -euo pipefail
          if [[ "$SKIP" != "true" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -f "$CONTAINERFILE" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Skipping build: containerfile not found: $CONTAINERFILE"
          fi

      - name: Detect container runtime
        if: steps.exists.outputs.present == 'true'
        id: runtime
        run: |
          set -euo pipefail
          if command -v docker &>/dev/null; then
            echo "tool=docker" >> "$GITHUB_OUTPUT"
          elif command -v podman &>/dev/null; then
            echo "tool=podman" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Neither podman nor docker found on this runner."
            exit 1
          fi

      - name: Build image
        if: steps.exists.outputs.present == 'true'
        env:
          IMAGE: ${{ inputs.image }}
          CONTAINERFILE: ${{ inputs.containerfile }}
          CONTEXT: ${{ inputs.context }}
          BUILD_ARGS: ${{ inputs.build-args }}
          GIT_SHA: ${{ github.sha }}
          TOOL: ${{ steps.runtime.outputs.tool }}
        run: |
          set -euo pipefail
          image_lc="${IMAGE,,}"
          extra_args=()
          if [ -n "$BUILD_ARGS" ]; then
            while IFS= read -r arg; do
              [ -z "$arg" ] && continue
              extra_args+=(--build-arg "$arg")
            done <<< "$BUILD_ARGS"
          fi
          "$TOOL" build \
            -f "$CONTAINERFILE" \
            -t "$image_lc:$GIT_SHA" \
            "${extra_args[@]+"${extra_args[@]}"}" \
            "$CONTEXT"

      - name: Smoke-test image
        if: steps.exists.outputs.present == 'true'
        env:
          IMAGE: ${{ inputs.image }}
          GIT_SHA: ${{ github.sha }}
          TOOL: ${{ steps.runtime.outputs.tool }}
        run: |
          set -euo pipefail
          image_lc="${IMAGE,,}"
          "$TOOL" image inspect "$image_lc:$GIT_SHA" > /dev/null
          echo "Image smoke-test passed."

      - name: Login to registry
        if: steps.exists.outputs.present == 'true' && inputs.push && github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          REGISTRY: ${{ inputs.registry }}
          TOKEN: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          TOOL: ${{ steps.runtime.outputs.tool }}
        run: |
          set -euo pipefail
          echo "$TOKEN" | "$TOOL" login "$REGISTRY" -u "$ACTOR" --password-stdin

      - name: Push image
        if: steps.exists.outputs.present == 'true' && inputs.push && github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          IMAGE: ${{ inputs.image }}
          GIT_SHA: ${{ github.sha }}
          TOOL: ${{ steps.runtime.outputs.tool }}
        run: |
          set -euo pipefail
          image_lc="${IMAGE,,}"
          "$TOOL" push "$image_lc:$GIT_SHA"
          "$TOOL" tag "$image_lc:$GIT_SHA" "$image_lc:latest"
          "$TOOL" push "$image_lc:latest"

      - name: Set image-ref output
        id: set-output
        env:
          IMAGE: ${{ inputs.image }}
          PUSH: ${{ inputs.push }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          PRESENT: ${{ steps.exists.outputs.present }}
        run: |
          set -euo pipefail
          image_lc="${IMAGE,,}"
          if [[ "$PRESENT" != "true" ]]; then
            echo "image_ref=" >> "$GITHUB_OUTPUT"
          elif [[ "$PUSH" == "true" && "$GIT_REF" == "refs/heads/main" && "$EVENT_NAME" == "push" ]]; then
            echo "image_ref=${image_lc}:${GIT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "image_ref=" >> "$GITHUB_OUTPUT"
          fi
