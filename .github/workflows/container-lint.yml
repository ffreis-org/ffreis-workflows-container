name: Container Lint

on:
  workflow_call:
    inputs:
      containerfile:
        description: "Path to the Containerfile or Dockerfile to lint"
        type: string
        required: true
      hadolint-config:
        description: "Path to .hadolint.yaml config file (optional)"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): NOT YET SUPPORTED — this
          runner has no docker/podman installed. Do not pass a self-hosted
          override here until a container runtime is provisioned there.
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  lint:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: Hadolint
    permissions:
      contents: read
      security-events: write
    runs-on: ${{ fromJson(inputs.runner) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Lint Containerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ inputs.containerfile }}
          config: ${{ inputs.hadolint-config }}
          format: sarif
          output-file: hadolint.sarif
          no-fail: false

      - name: Validate SARIF
        if: always()
        id: sarif
        run: |
          set -euo pipefail
          if [ -s hadolint.sarif ]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF
        if: always() && steps.sarif.outputs.valid == 'true'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          sarif_file: hadolint.sarif
          category: hadolint
