name: CI

on:
  pull_request:
    branches: [main]

# Validates that every workflow defined in this library functions correctly
# against the minimal example image in examples/hello/.
#
# Note: Self-test builds and scans a local image for pull requests. On main
# branch push events, it also pushes an image to GHCR and runs signing.
#
# container-scan-snyk requires SNYK_TOKEN to be configured in the repository and
# is gated to skip on fork pull requests.

permissions:
  contents: read
  actions: read
  security-events: write
  issues: read
  pull-requests: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows-policy:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4

  codeql-actions:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f # v1.2.1
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  lint:
    uses: ./.github/workflows/container-lint.yml
    with:
      containerfile: examples/hello/Containerfile
      hadolint-config: .hadolint.yaml

  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/container-build.yml
    with:
      image: hello-example-container
      context: examples/hello
      containerfile: examples/hello/Containerfile
      push: false

  build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/container-build.yml
    with:
      image: ghcr.io/${{ github.repository_owner }}/hello-example-container
      context: examples/hello
      containerfile: examples/hello/Containerfile
      push: true

  sign:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-push.outputs.image_ref != ''
    needs: [build-push]
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/container-sign.yml
    with:
      image-ref: ${{ needs.build-push.outputs.image_ref }}

  scan-grype:
    uses: ./.github/workflows/container-scan-grype.yml
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello
      severity: critical

  scan-trivy:
    uses: ./.github/workflows/container-scan-trivy.yml
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello
      severity: CRITICAL

  scan-snyk:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/container-scan-snyk.yml
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sbom:
    uses: ./.github/workflows/container-sbom.yml
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello

  sonarcloud:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-sonarcloud.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
