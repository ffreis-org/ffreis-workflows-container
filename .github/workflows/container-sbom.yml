name: Container SBOM

on:
  workflow_call:
    inputs:
      image-name:
        description: "Local image name/tag to build and generate SBOM for"
        type: string
        required: true
      containerfile:
        description: "Path to the Containerfile or Dockerfile"
        type: string
        required: true
      context:
        description: "Build context directory"
        type: string
        default: "."
      build-args:
        description: "Newline-separated build-arg pairs (KEY=VALUE)"
        type: string
        default: ""
      format:
        description: "SBOM output format: spdx-json or cyclonedx-json"
        type: string
        default: "spdx-json"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          runner has no docker/podman installed. Do not pass a self-hosted
          override here until a container runtime is provisioned there.
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  sbom:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: SBOM (Syft)
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Detect container runtime
        id: runtime
        run: |
          set -euo pipefail
          if command -v docker &>/dev/null; then
            echo "tool=docker" >> "$GITHUB_OUTPUT"
          elif command -v podman &>/dev/null; then
            echo "tool=podman" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Neither podman nor docker found on this runner."
            exit 1
          fi

      - name: Build image
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          CONTAINERFILE: ${{ inputs.containerfile }}
          CONTEXT: ${{ inputs.context }}
          BUILD_ARGS: ${{ inputs.build-args }}
          TOOL: ${{ steps.runtime.outputs.tool }}
        run: |
          set -euo pipefail
          extra_args=()
          if [ -n "$BUILD_ARGS" ]; then
            while IFS= read -r arg; do
              [ -z "$arg" ] && continue
              extra_args+=(--build-arg "$arg")
            done <<< "$BUILD_ARGS"
          fi
          "$TOOL" build \
            -f "$CONTAINERFILE" \
            -t "$IMAGE_NAME" \
            "${extra_args[@]+"${extra_args[@]}"}" \
            "$CONTEXT"

      - name: Install Syft
        run: |
          set -euo pipefail
          PINNED_COMMIT="860126c650c2d05b63b83a3895e41268162315a3"
          SCRIPT_URL="https://raw.githubusercontent.com/anchore/syft/${PINNED_COMMIT}/install.sh"
          mkdir -p ./bin
          curl --fail --show-error --silent --location \
            --proto '=https' --proto-redir '=https' \
            "$SCRIPT_URL" -o /tmp/syft-install.sh
          grep -q "syft" /tmp/syft-install.sh
          sh /tmp/syft-install.sh -b ./bin v1.44.0
          ./bin/syft version

      - name: Generate SBOM
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          FORMAT: ${{ inputs.format }}
        run: |
          set -euo pipefail
          mkdir -p sbom-results
          safe_name="$(echo "$IMAGE_NAME" | tr '/:' '--')"
          output_file="sbom-results/${safe_name}.${FORMAT}.json"
          ./bin/syft scan "$IMAGE_NAME" \
            --output "${FORMAT}=${output_file}"
          test -s "$output_file"
          echo "SBOM_FILE=${output_file}" >> "$GITHUB_ENV"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ inputs.format }}
          path: sbom-results/
          if-no-files-found: error
