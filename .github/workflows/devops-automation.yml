name: DevOps / Automation

on:
  schedule:
    - cron: "53 1 26 * *"  # monthly scattered (was: 0 3 * * 0)
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  scorecard:
    if: vars.SCORECARD_ENABLED != 'false'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

  stale:
    if: vars.STALE_ENABLED != 'false' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      only: "both"

  release-please:
    # Disabled: requires general-release-please.yml v1.0.2+ (workflow-level permissions fix)
    if: false && vars.RELEASE_PLEASE_ENABLED != 'false' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
