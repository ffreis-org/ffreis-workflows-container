name: Container Sign

on:
  workflow_call:
    inputs:
      image-ref:
        description: "Fully-qualified pushed image reference to sign (e.g. ghcr.io/owner/image:sha)"
        type: string
        required: true
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

# id-token: write is required for cosign keyless OIDC signing.
# The calling workflow must grant this permission on the calling job.

jobs:
  sign:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: Cosign (keyless)
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        env:
          IMAGE_REF: ${{ inputs.image-ref }}
        run: |
          set -euo pipefail
          echo "Signing image: ${IMAGE_REF}"
          cosign sign --yes "$IMAGE_REF"
          echo "Image signed successfully."
