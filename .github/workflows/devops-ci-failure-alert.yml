name: DevOps / CI Failure Alert

on:
  workflow_run:
    workflows:
      - CI
      - Self Test
      - DevOps / Security
    types: [completed]

permissions:
  pull-requests: write

jobs:
  alert:
    timeout-minutes: 15
    if: github.event.workflow_run.conclusion == 'failure'
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflow-failure-alert.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    permissions:
      pull-requests: write
